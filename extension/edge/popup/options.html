<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>迅雷去重助手设置</title>
  <style>
    :root {
      --bg: #edf3f8;
      --panel: rgba(255, 255, 255, 0.94);
      --panel-strong: #ffffff;
      --text: #173149;
      --muted: #6a7f92;
      --line: rgba(23, 49, 73, 0.12);
      --blue: #2f82d6;
      --blue-deep: #205f9f;
      --green: #1ea56b;
      --shadow: 0 18px 40px rgba(21, 46, 70, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(47, 130, 214, 0.18), transparent 34%),
        linear-gradient(180deg, #f2f7fb 0%, #eaf0f6 100%);
    }

    .page {
      width: min(100%, 920px);
      margin: 0 auto;
      padding: 28px 18px 32px;
    }

    .hero {
      padding: 26px;
      border-radius: 28px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(23, 57, 87, 0.94), rgba(47, 130, 214, 0.9)),
        #21465f;
      box-shadow: var(--shadow);
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 38px);
      line-height: 1.12;
      letter-spacing: 0.02em;
    }

    .hero p {
      max-width: 560px;
      margin: 14px 0 0;
      font-size: 14px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.86);
    }

    .version {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.14);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .card {
      padding: 20px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.82);
      box-shadow: 0 12px 28px rgba(21, 46, 70, 0.08);
      backdrop-filter: blur(10px);
    }

    .card h2 {
      margin: 0 0 6px;
      font-size: 18px;
    }

    .card p {
      margin: 0 0 16px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .field {
      margin-top: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .field input {
      width: 100%;
      min-height: 46px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-strong);
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field input:focus {
      border-color: rgba(47, 130, 214, 0.7);
      box-shadow: 0 0 0 4px rgba(47, 130, 214, 0.12);
    }

    .meta {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(47, 130, 214, 0.08);
    }

    .meta-row span:first-child {
      color: var(--muted);
    }

    .meta-row span:last-child {
      font-weight: 700;
    }

    .notice {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.65;
      color: var(--blue-deep);
      background: rgba(47, 130, 214, 0.1);
      border: 1px solid rgba(47, 130, 214, 0.14);
    }

    .action-bar {
      position: sticky;
      bottom: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
      padding: 14px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.84);
      box-shadow: 0 12px 24px rgba(21, 46, 70, 0.08);
      backdrop-filter: blur(10px);
    }

    .btn {
      flex: 1 1 180px;
      min-height: 46px;
      padding: 0 16px;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--green), #4dc593);
      box-shadow: 0 10px 18px rgba(30, 165, 107, 0.2);
    }

    .btn-secondary {
      color: var(--blue-deep);
      background: rgba(47, 130, 214, 0.1);
      border: 1px solid rgba(47, 130, 214, 0.16);
    }

    .save-status {
      flex: 1 1 100%;
      min-height: 22px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .save-status.success {
      color: var(--green);
      font-weight: 700;
    }

    .save-status.error {
      color: #d95c4f;
      font-weight: 700;
    }

    @media (max-width: 480px) {
      .page {
        padding: 18px 12px 24px;
      }

      .hero,
      .card {
        border-radius: 20px;
      }

      .hero {
        padding: 20px;
      }

      .hero-top {
        flex-direction: column;
      }

      .action-bar {
        bottom: 12px;
        padding: 12px;
      }

      .meta-row {
        flex-direction: column;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1>迅雷去重助手设置</h1>
          <p>设置浏览器扩展与桌面程序的连接参数。建议保持默认端口，只在你明确修改过桌面端监听配置时再调整。</p>
        </div>
        <span class="version">v1.0.0</span>
      </div>
    </section>

    <div class="grid">
      <section class="card">
        <h2>连接设置</h2>
        <p>这里控制浏览器扩展连接本地桌面程序时使用的地址和端口。</p>

        <div class="field">
          <label for="wsPort">WebSocket 端口</label>
          <input type="number" id="wsPort" value="9876" min="1000" max="65535">
        </div>

        <div class="field">
          <label for="wsHost">桌面应用地址</label>
          <input type="text" id="wsHost" value="localhost" placeholder="localhost">
        </div>
      </section>

      <section class="card">
        <h2>关于扩展</h2>
        <p>这部分主要用于快速确认版本信息，以及提醒当前这套扩展需要与桌面程序配合使用。</p>

        <div class="meta">
          <div class="meta-row">
            <span>版本</span>
            <span>1.0.0</span>
          </div>
          <div class="meta-row">
            <span>作者</span>
            <span>Developer</span>
          </div>
        </div>

        <div class="notice">
          请先启动桌面端并保持 WS 服务开启。设置页现在会在独立标签页里打开，不再缩进扩展小弹窗中。
        </div>
      </section>
    </div>

    <section class="action-bar">
      <button class="btn btn-primary" id="saveBtn">保存设置</button>
      <button class="btn btn-secondary" id="resetBtn">恢复默认</button>
      <div class="save-status" id="saveStatus"></div>
    </section>
  </div>

  <script src="options.js"></script>
</body>
</html>
